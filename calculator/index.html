<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="cals-text">
        <p id="history"></p>
        <p id="user-input">0</p>
      </div>
      <div class="cals-keys">
        <button class="cals-btn" id="clear">C</button>
        <button class="cals-btn" id="backspace">⌫</button>
        <button class="cals-btn" id="percent">%</button>
        <button class="cals-btn" id="divide">÷</button>

        <button class="cals-btn" id="seven">7</button>
        <button class="cals-btn" id="eight">8</button>
        <button class="cals-btn" id="nine">9</button>
        <button class="cals-btn" id="multiply">×</button>

        <button class="cals-btn" id="four">4</button>
        <button class="cals-btn" id="five">5</button>
        <button class="cals-btn" id="six">6</button>
        <button class="cals-btn" id="subtract">-</button>

        <button class="cals-btn" id="one">1</button>
        <button class="cals-btn" id="two">2</button>
        <button class="cals-btn" id="three">3</button>
        <button class="cals-btn" id="add">+</button>

        <button class="cals-btn zero" id="zero">0</button>
        <button class="cals-btn" id="decimal">.</button>
        <button class="cals-btn equal-sign" id="equal">=</button>
      </div>
      <!-- /.cals-keys -->
    </div>
    <!-- /.container -->
  </body>
  <script src="script.js"></script>
</html>
