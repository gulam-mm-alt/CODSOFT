<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Access</title>
    <meta name="description" content="Secure login portal to access restricted areas of the portfolio.">
    <link rel="stylesheet" href="style.css">
</head>

<body style="overflow: hidden;"> <!-- Prevent scrolling on login page for full immersion -->

    <div class="ambient-glow"
        style="width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0.1) 40%, rgba(0,0,0,0) 70%);">
    </div>

    <nav class="navbar scrolled"
        style="box-shadow: none; border-bottom: none; background: transparent; backdrop-filter: none;">
        <a href="index.html" class="nav-logo">Port<span class="text-gradient">folio</span></a>

        <a href="index.html" class="btn-secondary" style="padding: 0.5rem 1.2rem; font-size: 0.9rem;">Back to Home</a>
    </nav>

    <main class="login-page">
        <div class="glass-card login-container reveal">
            <div class="login-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your account.</p>

            <form id="loginForm" novalidate>
                <div class="form-group" id="emailGroup">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" autocomplete="email" required>
                    <div class="error-message">Please enter a valid email address.</div>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                        required>
                    <div class="error-message">Password must be at least 6 characters.</div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary btn-submit">Sign In</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="#">Create one</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Specific inline script for Login form mock validation to keep interactivity rich
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailGroup = document.getElementById('emailGroup');
            const passwordGroup = document.getElementById('passwordGroup');
            const btnSubmit = document.querySelector('.btn-submit');

            form.addEventListener('submit', (e) => {
                e.preventDefault(); // Prevent actual submission

                let isValid = true;

                // Reset states
                emailGroup.classList.remove('error');
                passwordGroup.classList.remove('error');

                // Basic validation
                if (!emailInput.value || !emailInput.value.includes('@')) {
                    emailGroup.classList.add('error');
                    isValid = false;
                }

                if (!passwordInput.value || passwordInput.value.length < 6) {
                    passwordGroup.classList.add('error');
                    isValid = false;
                }

                if (isValid) {
                    // Simulate loading state
                    const originalText = btnSubmit.textContent;
                    btnSubmit.textContent = 'Authenticating...';
                    btnSubmit.style.opacity = '0.7';
                    btnSubmit.disabled = true;

                    // Fake network delay
                    setTimeout(() => {
                        btnSubmit.textContent = 'Success!';
                        btnSubmit.style.background = '#10b981';
                        btnSubmit.style.opacity = '1';

                        // Fake redirect
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    }, 1500);
                }

                // Trigger shake animation on form if invalid
                if (!isValid) {
                    const container = document.querySelector('.login-container');
                    container.style.transform = 'translate(5px, 0)';
                    setTimeout(() => container.style.transform = 'translate(-5px, 0)', 100);
                    setTimeout(() => container.style.transform = 'translate(5px, 0)', 200);
                    setTimeout(() => container.style.transform = 'translate(-5px, 0)', 300);
                    setTimeout(() => container.style.transform = 'translate(0, 0)', 400);
                }
            });
        });
    </script>
</body>

</html>
